<div class="form-group">
                <label>টপআপের মাধ্যম বেছে নিন</label>
                <select name="order_type" id="order_type" onchange="toggleFields()" required>
                    <option value="Free Fire ID Code">Free Fire UID (আইডি কোড)</option>
                    <option value="Social Media">In-Game Login (Facebook/Google)</option>
                </select>
            </div>

            <!-- UID ফিল্ড -->
            <div id="id_code_fields">
                <div class="form-group">
                    <label>গেম UID</label>
                    <input type="number" name="uid" required placeholder="আপনার গেম UID দিন">
                </div>
            </div>

            <!-- সোশ্যাল মিডিয়া লগইন ফিল্ড -->
            <div id="social_fields" class="hidden">
                <div class="form-group">
                    <label>লগইন টাইপ</label>
                    <select name="login_type">
                        <option value="Facebook">Facebook Login</option>
                        <option value="Google">Google Login</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>নম্বর অথবা ইমেইল</label>
                    <input type="text" name="number_or_email" placeholder="অ্যাকাউন্টের ইমেইল/নম্বর দিন">
                </div>
                <div class="form-group">
                    <label>পাসওয়ার্ড</label>
                    <input type="password" name="password" placeholder="অ্যাকাউন্টের পাসওয়ার্ড দিন">
                </div>
            </div>

            <!-- প্যাকেজ লিস্ট -->
            <div class="form-group">
                <label>প্যাকেজ সিলেক্ট করুন</label>
                <select name="package" required>
                    <option value="" disabled selected>যা নিতে চান বাছুন...</option>
                    <option value="25 Diamond - 23 Tk">25 💎 — ২৩ টাকা</option>
                    <option value="50 Diamond - 45 Tk">50 💎 — ৪৫ টাকা</option>
                    <option value="115 Diamond - 85 Tk">115 💎 — ৮৫ টাকা</option>
                    <option value="240 Diamond - 165 Tk">240 💎 — ১৬৫ টাকা</option>
                    <option value="505 Diamond - 340 Tk">505 💎 — ৩৪০ টাকা</option>
                    <option value="1020 Diamond - 670 Tk">1020 💎 — ৬৭০ টাকা</option>
                    <option value="Weekly Membership">Weekly Membership 🎫 — ১৬০ টাকা</option>
                    <option value="Monthly Membership">Monthly Membership 👑 — ৬৫০ টাকা</option>
                </select>
            </div>

            <!-- পেমেন্ট নম্বর -->
            <div class="form-group">
                <label>বিকাশ/নগদ নম্বর (টাকা পাঠানোর নম্বর)</label>
                <input type="text" name="payment_no" required placeholder="আপনার পার্সোনাল নম্বর দিন">
            </div>

            <button type="submit" class="submit-btn">অর্ডার সাবমিট করুন</button>
        </form>
    </div>

</body>
</html>
