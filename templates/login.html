<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .login-box { background: #1e293b; padding: 30px; display: inline-block; border-radius: 10px; border: 1px solid #334155; }
        input { display: block; margin: 15px auto; padding: 10px; width: 200px; border-radius: 5px; border: none; }
        button { background: #00f2fe; color: #0f172a; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Login Panel</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">লগইন করুন</button>
        </form>
    </div>
</body>
</html>
