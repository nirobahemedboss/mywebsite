<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8"><title>Admin Login - NAHID TOPUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
    <div class="bg-gray-800 p-8 rounded-2xl border border-gray-700 w-full max-w-sm">
        <h2 class="text-xl font-bold text-center text-orange-500 mb-6">অ্যাডমিন লগইন</h2>
        {% if error %}<p class="text-red-500 text-xs text-center mb-4">{{ error }}</p>{% endif %}
        <form action="/nahid-admin" method="POST" class="space-y-4">
            <input type="password" name="password" placeholder="অ্যাডমিন পাসওয়ার্ড দিন" required
                class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-orange-500">
            <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 font-bold py-2.5 rounded-xl transition">লগইন করুন</button>
        </form>
    </div>
</body>
</html>
