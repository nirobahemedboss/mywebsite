<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NAHID TOPUP</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #1a1a2e; margin: 0; color: #fff; }
        .login-container { background: #162447; padding: 40px; border-radius: 12px; box-shadow: 0px 8px 20px rgba(0,0,0,0.5); width: 100%; max-width: 360px; box-sizing: border-box; text-align: center; }
        h2 { margin-bottom: 25px; color: #e43f5a; font-size: 26px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #bbb; font-weight: 500; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #1f4068; background: #1a1a2e; color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input[type="text"]:focus, input[type="password"]:focus { border-color: #e43f5a; outline: none; }
        button { width: 100%; padding: 12px; background-color: #e43f5a; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #b92b45; }
        .error { color: #ff3333; background: rgba(255, 51, 51, 0.1); padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; border: 1px solid rgba(255, 51, 51, 0.3); }
        .back-link { display: inline-block; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .back-link:hover { color: #e43f5a; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Admin Login</h2>
    
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    
    <form action="/login" method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Username দিন" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Password দিন" required>
        </div>

        <button type="submit">Log In</button>
    </form>
    
    <a href="/" class="back-link">← Back to Home</a>
</div>

</body>
</html>
