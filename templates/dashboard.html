<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8"><title>Admin Dashboard - NAHID TOPUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-orange-500"><i class="fa-solid fa-user-shield"></i> NAHID TOPUP Dashboard</h1>
        <a href="/admin-logout" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-4 py-2 rounded-xl transition">লগআউট করুন</a>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-5xl">
        <div class="bg-gray-800 rounded-2xl border border-gray-700 overflow-hidden shadow-xl">
            <div class="p-4 bg-gray-850 border-b border-gray-700"><h3 class="font-bold">আগত অর্ডারসমূহের তালিকা</h3></div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-900 text-gray-400 text-xs">
                        <tr>
                            <th class="p-4">UID</th>
                            <th class="p-4">পেমেন্ট নম্বর/Txn ID</th>
                            <th class="p-4">প্যাকেজ</th>
                            <th class="p-4">স্ট্যাটাস</th>
                            <th class="p-4 text-center">অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-700 text-sm">
                        {% for order in orders %}
                        <tr class="hover:bg-gray-750">
                            <td class="p-4 font-mono font-bold text-orange-400 select-all">{{ order.uid }}</td>
                            <td class="p-4 font-mono select-all">{{ order.payment_no }}</td>
                            <td class="p-4 text-gray-300 font-semibold">{{ order.package }}</td>
                            <td class="p-4">
                                <span class="px-2.5 py-0.5 rounded-full text-xs font-semibold {{ 'bg-green-500/10 text-green-400' if order.status == 'Completed' else 'bg-yellow-500/10 text-yellow-400' }}">
                                    {{ order.status }}
                                </span>
                            </td>
                            <td class="p-4 flex justify-center gap-2">
                                {% if order.status == 'Pending' %}
                                <a href="/complete-order/{{ order.id }}" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition">Complete</a>
                                {% else %}
                                <span class="text-xs text-gray-500 italic">Done</span>
                                {% endif %}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
